<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ASTROVERA — วิเคราะห์ด้วย AI</title>

<!-- ===== CSS ===== -->
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="./responsive.css">

<!-- ===== PWA ===== -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#130028">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ===== หน้า analysis-specific ===== */
  .ai-selector{display:flex;gap:10px;margin-bottom:16px}
  .ai-btn{flex:1;padding:14px 10px;border-radius:var(--r2);border:2px solid var(--border);background:rgba(28,0,64,.6);text-align:center;cursor:pointer;transition:all .2s;color:var(--tx2)}
  .ai-btn.active{border-color:var(--gold);background:rgba(176,64,255,.15);color:var(--gold);box-shadow:0 0 20px rgba(176,64,255,.15)}
  .ai-btn .ai-icon{font-size:24px;display:block;margin-bottom:4px}
  .ai-btn .ai-name{font-size:14px;font-weight:700}
  .ai-btn .ai-desc{font-size:10px;color:var(--tx3);margin-top:2px}
  .ai-auto-badge{font-size:9px;background:rgba(176,64,255,.2);color:var(--gold2);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}

  .lens-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
  .lens-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(176,64,255,.1)}

  .result-box{background:var(--bg3);border-radius:var(--r2);padding:16px;min-height:120px;border:1px solid var(--border);white-space:pre-wrap;font-size:14px;line-height:1.8;color:var(--tx2)}
  .voice-controls{display:flex;gap:10px;margin:14px 0}
  .voice-controls button{flex:1;padding:10px;border-radius:var(--r2);border:1px solid var(--border);background:rgba(176,64,255,.08);color:var(--tx2);cursor:pointer;font-size:14px;transition:all .15s}
  .voice-controls button:hover{background:rgba(176,64,255,.15);border-color:var(--gold)}
  .ask-more{display:flex;gap:10px;margin:14px 0}
  .ask-more textarea{flex:1;min-height:60px;padding:12px;border-radius:var(--r2);border:1px solid var(--border);background:rgba(28,0,64,.6);color:var(--tx);font-size:14px;resize:vertical}
  .ask-more button{padding:12px 24px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,#B040FF,#7B00D4);color:#fff;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="app">
  <!-- ===== HEADER ===== -->
  <div class="tb">
    <button class="bk-btn" onclick="window.location.href='./index.html'">←</button>
    <div class="tb-t">🔮 วิเคราะห์ด้วย AI</div>
    <button class="tb-act" onclick="saveAnalysis()">💾 บันทึก</button>
  </div>

  <!-- ===== CONTENT ===== -->
  <div class="sb" style="padding:16px 18px 100px">
    <!-- AI Selector -->
    <div class="ai-selector" id="ai-selector">
      <button class="ai-btn" data-ai="vela" onclick="selectAI('vela',this)">
        <span class="ai-icon">🧠</span>
        <span class="ai-name">เวล่า (VELA)</span>
        <span class="ai-desc">ผู้รู้ หนักแน่น วิเคราะห์ชีวิต</span>
        <span class="ai-auto-badge">⭐ อัตโนมัติ</span>
      </button>
      <button class="ai-btn" data-ai="wellany" onclick="selectAI('wellany',this)">
        <span class="ai-icon">💚</span>
        <span class="ai-name">เว็ลลานี่ (WELLANY)</span>
        <span class="ai-desc">นุ่มนวล ดูแลสุขภาพใจ</span>
      </button>
    </div>

    <!-- Lens Selector -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <button class="lens-btn active" data-lens="general" onclick="selectLens('general',this)">🔮 ทั่วไป</button>
      <button class="lens-btn" data-lens="career" onclick="selectLens('career',this)">💼 อาชีพ</button>
      <button class="lens-btn" data-lens="love" onclick="selectLens('love',this)">💞 ความรัก</button>
      <button class="lens-btn" data-lens="finance" onclick="selectLens('finance',this)">💰 การเงิน</button>
      <button class="lens-btn" data-lens="health" onclick="selectLens('health',this)">🌿 สุขภาพ</button>
    </div>

    <!-- Result -->
    <div id="analysis-result" class="result-box">
      👋 เลือก AI และเลนส์ แล้วกด "วิเคราะห์" หรือถามต่อด้านล่าง
    </div>

    <!-- Voice Controls -->
    <div class="voice-controls">
      <button id="playVoiceBtn" onclick="playAnalysisVoice()">🔊 ฟังเสียง</button>
      <button id="stopVoiceBtn" onclick="stopAnalysisVoice()">⏹ หยุด</button>
    </div>

    <!-- Ask More -->
    <div class="ask-more">
      <textarea id="followUpQuestion" placeholder="ถามต่อได้เลย... เช่น ช่วยอธิบายเพิ่มตรงนี้หน่อย"></textarea>
      <button onclick="askFollowUp()">ส่ง</button>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn bgh bsm" style="flex:1" onclick="saveAnalysis()">💾 บันทึก</button>
      <button class="btn bgh bsm" style="flex:1" onclick="shareAnalysis()">📤 แชร์</button>
    </div>

    <!-- Loading indicator -->
    <div id="analysis-loading" style="display:none;text-align:center;padding:20px;color:var(--tx3)">
      <div style="width:32px;height:32px;border:3px solid rgba(176,64,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px"></div>
      กำลังวิเคราะห์...
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bnav">
    <button class="bni" onclick="window.location.href='./index.html'"><span>✦</span><span>หน้าแรก</span></button>
    <button class="bni on" onclick="window.location.href='./analysis.html'"><span>🔮</span><span>วิเคราะห์</span></button>
    <button class="bni" onclick="window.location.href='./index.html#dash'"><span>📊</span><span>แดชบอร์ด</span></button>
    <button class="bni" onclick="window.location.href='./index.html#profile'"><span>👤</span><span>โปรไฟล์</span></button>
  </nav>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="./api.js"></script>
<script src="./voice.js"></script>
<script src="./app.js"></script>

<script>
// ============================================================
// ANALYSIS PAGE LOGIC
// ============================================================

// ---- State ----
var _currentAI = localStorage.getItem('av_ai') || 'vela';
var _currentLens = 'general';
var _lastResult = '';

// ---- AI Selector ----
function selectAI(ai, btn) {
  _currentAI = ai;
  localStorage.setItem('av_ai', ai);
  
  document.querySelectorAll('.ai-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  
  // เลือกเสียงอัตโนมัติตาม AI
  selectVoiceForAI(ai);
  
  toast('เลือก ' + (ai === 'vela' ? 'เวล่า (VELA)' : 'เว็ลลานี่ (WELLANY)') + ' แล้ว');
}

// ---- Lens Selector ----
function selectLens(lens, btn) {
  _currentLens = lens;
  document.querySelectorAll('.lens-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
}

// ---- Voice Selection ----
function selectVoiceForAI(ai) {
  var voices = window.speechSynthesis.getVoices();
  if (!voices.length) {
    window.speechSynthesis.onvoiceschanged = function() {
      selectVoiceForAI(ai);
    };
    return;
  }
  
  var voiceName = ai === 'vela' ? 'Female' : 'Male'; // หรือใช้ชื่อเฉพาะ
  var selected = voices.find(function(v) {
    return v.lang.startsWith('th') && v.name.includes(voiceName);
  });
  
  if (selected) {
    localStorage.setItem('av_voice_uri', selected.voiceURI);
  }
}

// ---- Analysis ----
function analyzeWithAI() {
  var resultEl = document.getElementById('analysis-result');
  var loadingEl = document.getElementById('analysis-loading');
  
  // โหลดข้อมูลผู้ใช้
  var profile = loadProfile();
  if (!profile || !profile.dob) {
    resultEl.textContent = '⚠️ กรุณากรอกข้อมูลโปรไฟล์ให้ครบ (ชื่อ + วันเกิด) ก่อนวิเคราะห์';
    return;
  }
  
  // แสดง loading
  loadingEl.style.display = 'block';
  resultEl.textContent = '⏳ กำลังวิเคราะห์...';
  
  var payload = {
    user_id: profile.user_id || 'anonymous',
    name: profile.name || 'ผู้ใช้',
    gender: profile.gender || '',
    birth_date: profile.dob,
    birth_time: profile.time || '',
    birth_place: profile.place || '',
    blood_type: profile.bloodType || '',
    lens: _currentLens,
    ai: _currentAI,
    question: 'วิเคราะห์ชีวิตโดยรวม'
  };
  
  // เรียก API
  fetch('/.netlify/functions/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  })
  .then(function(data) {
    loadingEl.style.display = 'none';
    var text = data.data || data.result || 'ไม่ได้รับข้อมูล';
    _lastResult = text;
    resultEl.textContent = text;
    
    // บันทึกประวัติลง localStorage
    saveHistory(payload, text);
    
    // ฟังเสียงอัตโนมัติ (ถ้าเปิด auto-play)
    if (localStorage.getItem('av_auto_play') === 'true') {
      setTimeout(playAnalysisVoice, 500);
    }
  })
  .catch(function(err) {
    loadingEl.style.display = 'none';
    resultEl.textContent = '❌ เกิดข้อผิดพลาด: ' + err.message;
    console.error(err);
  });
}

// ---- Ask Follow-up ----
function askFollowUp() {
  var questionEl = document.getElementById('followUpQuestion');
  var question = questionEl.value.trim();
  if (!question) {
    toast('กรุณาพิมพ์คำถามก่อน');
    return;
  }
  
  var resultEl = document.getElementById('analysis-result');
  var loadingEl = document.getElementById('analysis-loading');
  
  loadingEl.style.display = 'block';
  resultEl.textContent = '⏳ กำลังคิดคำตอบ...';
  
  var profile = loadProfile();
  var payload = {
    user_id: profile.user_id || 'anonymous',
    question: question,
    lens: _currentLens,
    ai: _currentAI,
    context: 'follow-up',
    history: getHistory()
  };
  
  fetch('/.netlify/functions/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  })
  .then(function(data) {
    loadingEl.style.display = 'none';
    var text = data.data || data.result || 'ไม่ได้รับคำตอบ';
    _lastResult = text;
    resultEl.textContent = text;
    questionEl.value = '';
    
    // บันทึกประวัติ
    saveHistory(payload, text);
  })
  .catch(function(err) {
    loadingEl.style.display = 'none';
    resultEl.textContent = '❌ ' + err.message;
    console.error(err);
  });
}

// ---- Save Analysis ----
function saveAnalysis() {
  if (!_lastResult) {
    toast('ยังไม่มีข้อมูลที่จะบันทึก');
    return;
  }
  
  var profile = loadProfile();
  var record = {
    user_id: profile.user_id || 'anonymous',
    ai: _currentAI,
    lens: _currentLens,
    result: _lastResult,
    created_at: new Date().toISOString()
  };
  
  // บันทึก localStorage
  var history = JSON.parse(localStorage.getItem('av_analysis_history') || '[]');
  history.unshift(record);
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('av_analysis_history', JSON.stringify(history));
  
  // ถ้ามี Supabase ก็ส่งไปด้วย
  if (window.supabase) {
    saveToSupabase(record);
  }
  
  toast('💾 บันทึกสำเร็จ!');
}

// ---- Save to Supabase ----
function saveToSupabase(record) {
  if (!window.supabase) return;
  
  window.supabase
    .from('analysis_history')
    .insert([record])
    .then(function(res) {
      if (res.error) console.error('Supabase error:', res.error);
    });
}

// ---- Load Profile ----
function loadProfile() {
  try {
    return JSON.parse(localStorage.getItem('av_p')) || {};
  } catch(e) {
    return {};
  }
}

// ---- History ----
function getHistory() {
  try {
    var history = JSON.parse(localStorage.getItem('av_analysis_history') || '[]');
    return history.slice(0, 5).map(function(h) {
      return { role: 'user', content: h.result };
    });
  } catch(e) {
    return [];
  }
}

function saveHistory(payload, result) {
  var record = {
    user_id: payload.user_id,
    ai: payload.ai || _currentAI,
    lens: payload.lens || _currentLens,
    question: payload.question || '',
    result: result,
    created_at: new Date().toISOString()
  };
  var history = JSON.parse(localStorage.getItem('av_analysis_history') || '[]');
  history.unshift(record);
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('av_analysis_history', JSON.stringify(history));
}

// ---- Voice ----
function playAnalysisVoice() {
  if (!_lastResult) {
    toast('ยังไม่มีข้อความให้ฟัง');
    return;
  }
  
  // เลือกเสียงตาม AI
  var voice = null;
  var voices = window.speechSynthesis.getVoices();
  var voiceURI = localStorage.getItem('av_voice_uri');
  
  if (voiceURI) {
    voice = voices.find(function(v) { return v.voiceURI === voiceURI; });
  }
  
  if (!voice) {
    var lang = _currentAI === 'vela' ? 'th-TH' : 'th-TH';
    var gender = _currentAI === 'vela' ? 'Female' : 'Male';
    voice = voices.find(function(v) {
      return v.lang.startsWith('th') && v.name.includes(gender);
    });
  }
  
  speakText(_lastResult, voice, 0.9);
}

function stopAnalysisVoice() {
  stopSpeaking();
}

// ---- Share ----
function shareAnalysis() {
  if (!_lastResult) {
    toast('ยังไม่มีผลลัพธ์ให้แชร์');
    return;
  }
  
  var text = '🔮 ผลวิเคราะห์จาก ASTROVERA\n\n' + _lastResult + '\n\n— แชร์จาก ASTROVERA';
  
  if (navigator.share) {
    navigator.share({ title: 'ASTROVERA — ผลวิเคราะห์', text: text });
  } else {
    // Copy to clipboard
    navigator.clipboard.writeText(text).then(function() {
      toast('📋 คัดลอกแล้ว');
    }).catch(function() {
      // Fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('📋 คัดลอกแล้ว');
    });
  }
}

// ---- Toast Helper ----
function toast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() {
    el.classList.remove('on');
  }, 2500);
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', function() {
  // เลือก AI ที่เคยใช้
  var savedAI = localStorage.getItem('av_ai') || 'vela';
  var btn = document.querySelector('.ai-btn[data-ai="' + savedAI + '"]');
  if (btn) {
    selectAI(savedAI, btn);
  }
  
  // โหลดเสียง
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    selectVoiceForAI(_currentAI);
  };
  
  // วิเคราะห์อัตโนมัติถ้ามีข้อมูล
  var profile = loadProfile();
  if (profile && profile.dob) {
    setTimeout(analyzeWithAI, 500);
  }
});
</script>

</body>
</html>
