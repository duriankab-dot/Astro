<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTROVERA — ผลวิเคราะห์</title>
    <style>
        :root {
            --bg: #0a0812;
            --bg2: #12102a;
            --tx: #e8e0f0;
            --tx2: #9a90b8;
            --primary: #7c5ce7;
            --primary2: #5b3dc7;
            --accent: #a78bfa;
            --border: #2a2540;
            --radius: 12px;
            --font: 'Sarabun', 'Noto Sans Thai', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: var(--font);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================
           SHOOTING STARS BACKGROUND
           ============================================ */
        .stars-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c4b5fd;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(196, 181, 253, 0.6);
            animation: shoot linear infinite;
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, rgba(196, 181, 253, 0.8), transparent);
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateX(-600px) translateY(350px); opacity: 0; }
        }
        .shooting-star:nth-child(1) { top: 5%; left: 85%; animation-duration: 3s; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 20%; left: 90%; animation-duration: 4s; animation-delay: 1.5s; }
        .shooting-star:nth-child(3) { top: 35%; left: 88%; animation-duration: 3.5s; animation-delay: 3s; }
        .shooting-star:nth-child(4) { top: 50%; left: 92%; animation-duration: 5s; animation-delay: 5s; }
        .shooting-star:nth-child(5) { top: 65%; left: 80%; animation-duration: 3.8s; animation-delay: 2s; }
        .shooting-star:nth-child(6) { top: 10%; left: 95%; animation-duration: 4.2s; animation-delay: 6s; }
        .shooting-star:nth-child(7) { top: 55%; left: 86%; animation-duration: 3.2s; animation-delay: 4s; }
        .shooting-star:nth-child(8) { top: 75%; left: 90%; animation-duration: 4.5s; animation-delay: 7s; }
        .shooting-star:nth-child(9) { top: 30%; left: 82%; animation-duration: 3.6s; animation-delay: 8s; }
        .shooting-star:nth-child(10){ top: 45%; left: 94%; animation-duration: 4.8s; animation-delay: 2.5s; }

        .static-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(196, 181, 253, 0.5);
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 20px;
        }
        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--tx2);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 13px;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--primary); color: var(--accent); }
        .logo-sm {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* User Info Bar */
        .user-bar {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info h2 { font-size: 16px; font-weight: 600; }
        .user-info span { font-size: 12px; color: var(--tx2); }
        .archetype-badge {
            background: rgba(124, 92, 231, 0.12);
            border: 1px solid var(--primary2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            color: var(--accent);
            white-space: nowrap;
        }

        /* AI Selector */
        .ai-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .ai-btn {
            flex: 1;
            padding: 10px 6px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--tx2);
            font-family: var(--font);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .ai-btn.active {
            border-color: var(--primary);
            color: var(--accent);
            background: rgba(124, 92, 231, 0.08);
        }
        .ai-btn .ai-icon { font-size: 18px; display: block; }
        .ai-btn .ai-name { font-weight: 600; font-size: 13px; }
        .ai-btn .ai-lens { font-size: 10px; color: var(--tx2); }

        /* Live Voice Card */
        .voice-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .voice-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .voice-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--tx2);
            text-align: center;
            margin-bottom: 16px;
        }
        .voice-title {
            text-align: center;
            font-size: 14px;
            color: var(--tx);
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Progress Bar */
        .progress-wrap { margin-bottom: 20px; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--tx2);
        }

        /* Playback Controls */
        .playback-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .ctrl-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--tx);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover { border-color: var(--primary); color: var(--accent); }
        .ctrl-btn.play-btn {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            border: none;
            font-size: 22px;
            box-shadow: 0 4px 20px rgba(124, 92, 231, 0.4);
        }
        .ctrl-btn.play-btn:hover { opacity: 0.9; box-shadow: 0 6px 30px rgba(124, 92, 231, 0.6); }
        .ctrl-btn.play-btn.playing { background: var(--primary2); }
        .speed-indicator {
            font-size: 10px;
            color: var(--tx2);
            text-align: center;
            margin-bottom: 12px;
        }

        /* Voice Options */
        .voice-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .voice-opt {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--tx2);
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s;
        }
        .voice-opt:hover { border-color: var(--primary); color: var(--accent); }
        .voice-opt.selected {
            border-color: var(--primary);
            color: var(--accent);
            background: rgba(124, 92, 231, 0.1);
        }

        /* Download */
        .download-area { text-align: center; margin-bottom: 16px; }
        .download-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--tx2);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .download-btn:hover { border-color: var(--primary); color: var(--accent); }

        /* Chat Section */
        .chat-section { margin-bottom: 20px; }
        .chat-section h3 {
            font-size: 13px;
            color: var(--tx2);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chat-input-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .chat-input-wrap input {
            flex: 1;
            padding: 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--tx);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
        }
        .chat-input-wrap input:focus { border-color: var(--primary); }
        .chat-input-wrap button {
            padding: 12px 18px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .chat-input-wrap button:hover { opacity: 0.9; }
        .mic-btn {
            padding: 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--tx2);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        .mic-btn:hover { border-color: var(--primary); color: var(--accent); }
        .mic-btn.listening {
            border-color: #e74c3c;
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
        }

        /* Chat History */
        .chat-history { max-height: 300px; overflow-y: auto; }
        .chat-msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
        }
        .chat-msg.user {
            background: rgba(124, 92, 231, 0.15);
            text-align: right;
            margin-left: 30px;
        }
        .chat-msg.ai {
            background: var(--bg2);
            border: 1px solid var(--border);
            margin-right: 30px;
        }
        .chat-msg .sender {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Analysis Cards */
        .analysis-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        .analysis-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .analysis-card h4 {
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .analysis-card p {
            font-size: 13px;
            color: var(--tx2);
            line-height: 1.6;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg2);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            color: var(--tx2);
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: var(--font);
        }
        .tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            font-weight: 600;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(124, 92, 231, 0.4);
        }
        .toast.show { opacity: 1; }

        /* Responsive */
        @media (max-width: 360px) {
            .container { padding: 12px; }
            .ai-btn { padding: 8px 4px; font-size: 10px; }
            .ai-btn .ai-name { font-size: 11px; }
        }
    </style>
</head>
<body>

<!-- Shooting Stars Background -->
<div class="stars-container">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
</div>

<div class="container">

    <!-- Top Bar -->
    <div class="topbar">
        <button class="back-btn" onclick="window.location.href='index.html'">← กลับ</button>
        <div class="logo-sm">ASTROVERA</div>
        <div style="width:50px;"></div>
    </div>

    <!-- User Info -->
    <div class="user-bar">
        <div class="user-info">
            <h2 id="userNameDisplay">—</h2>
            <span id="userDetailDisplay">กำลังโหลด...</span>
        </div>
        <div class="archetype-badge" id="archetypeBadge">🔮 วิเคราะห์...</div>
    </div>

    <!-- AI Selector -->
    <div class="ai-selector">
        <button class="ai-btn active" onclick="switchAI('auto')" id="tab-auto">
            <span class="ai-icon">🔮</span>
            <span class="ai-name">อัตโนมัติ</span>
        </button>
        <button class="ai-btn" onclick="switchAI('vela')" id="tab-vela">
            <span class="ai-icon">⚡</span>
            <span class="ai-name">เวล่า</span>
            <span class="ai-lens">Western · ตัวตน</span>
        </button>
        <button class="ai-btn" onclick="switchAI('wellani')" id="tab-wellani">
            <span class="ai-icon">🌟</span>
            <span class="ai-name">เว็ลลานี่</span>
            <span class="ai-lens">Vedic+Thai · แนวโน้ม</span>
        </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('voice')" id="tab-voice">🎙️ Live Voice</button>
        <button class="tab" onclick="switchTab('analysis')" id="tab-analysis">📊 วิเคราะห์</button>
    </div>

    <!-- === VOICE TAB === -->
    <div id="voiceTab">

        <!-- Live Voice Card -->
        <div class="voice-card">
            <div class="voice-label">🎙️ Live Voice Summary</div>
            <div class="voice-title" id="voiceTitle">กำลังสร้างบทสรุปของคุณ...</div>

            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-time">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="playback-controls">
                <button class="ctrl-btn" onclick="skipBack()" title="ย้อนกลับ 10s">⏪</button>
                <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="ctrl-btn" onclick="skipForward()" title="เดินหน้า 10s">⏩</button>
            </div>
            <div class="speed-indicator">ความเร็ว <strong id="speedDisplay">0.9x</strong></div>

            <div class="voice-options">
                <button class="voice-opt selected" onclick="setSpeed(0.9)">0.9x</button>
                <button class="voice-opt" onclick="setSpeed(1.0)">1.0x</button>
                <button class="voice-opt" onclick="setSpeed(1.2)">1.2x</button>
                <button class="voice-opt" onclick="restartAudio()">↺ เริ่มใหม่</button>
            </div>

            <div class="download-area">
                <button class="download-btn" onclick="downloadReport()">📥 ดาวน์โหลดรายงาน (.txt)</button>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="chat-section">
            <h3>💬 ถามต่อเนื่อง (Real-time)</h3>
            <div class="chat-input-wrap">
                <input type="text" id="chatInput" placeholder="พิมพ์คำถาม... (เช่น 'ควรรับเงินลงทุนไหม')" onkeydown="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">ส่ง</button>
                <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="chat-msg ai">
                    <div class="sender">🔮 ASTROVERA</div>
                    สวัสดี คุณสามารถถามเพิ่มเติมเกี่ยวกับผลวิเคราะห์ แนวโน้มชีวิต หรือการตัดสินใจสำคัญได้เลย
                </div>
            </div>
        </div>

    </div>

    <!-- === ANALYSIS TAB === -->
    <div id="analysisTab" style="display:none;">
        <div class="analysis-grid" id="analysisGrid"></div>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================
// STATE
// ============================================
let currentAI = 'auto';
let currentTab = 'voice';
let isPlaying = false;
let currentSpeed = 0.9;
let audioProgress = 0;
let audioDuration = 120;
let progressInterval = null;
let isListening = false;

let analysisData = {
    vela: {
        personality: 'คุณเป็นผู้มีพลังงานของนักสร้างที่มีวิสัยทัศน์...',
        strength: 'สื่อสารหนักแน่น · ทำงานละเอียด · เป็นผู้นำโดยธรรมชาติ · มองภาพใหญ่ · กล้าตัดสินใจ',
        weakness: 'แบกทุกอย่างไว้คนเดียว ไม่ค่อยขอความช่วยเหลือ บางครั้งรีบร้อนเกินไป',
        talent: 'ผู้นำ นักพัฒนา นักวิเคราะห์ข้อมูล นักเจรจาต่อรอง'
    },
    wellani: {
        finance_trend: 'แนวโน้มการเงินดีขึ้นช่วงกลางปี 2028-2029 ดาวพฤหัสเคลื่อนผ่านเรือนการเงิน',
        investment_advice: 'ดีลนี้มีแนวโน้มสำเร็จ 60-70% แต่แนะนำตรวจสอบทีมและสัญญาอย่างละเอียด',
        relationship_trend: 'ควรสื่อสารให้ชัดเจน หลีกเลี่ยงการเก็บความรู้สึก',
        forecast_5y: '2026: เริ่มต้น, 2027: ปรับตัว, 2028: เติบโต, 2029: ขยาย, 2030: เก็บเกี่ยว'
    }
};

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    // Generate static stars
    const container = document.querySelector('.stars-container');
    for (let i = 0; i < 25; i++) {
        const star = document.createElement('div');
        star.className = 'static-star';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.width = (1 + Math.random() * 2) + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
    }
    
    loadUserData();
    renderAnalysisCards();
    
    const savedLens = localStorage.getItem('astrovera_selected_lens');
    if (savedLens && savedLens !== 'auto') {
        switchAI(savedLens);
    }
});

function loadUserData() {
    const saved = localStorage.getItem('astrovera_user_data');
    if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('userNameDisplay').textContent = data.name || 'ไม่ระบุ';
        const details = [];
        if (data.birth_date) details.push('เกิด ' + formatDate(data.birth_date));
        if (data.blood_type) details.push('กรุ๊ป ' + data.blood_type);
        document.getElementById('userDetailDisplay').textContent = details.join(' · ') || '—';
        document.getElementById('archetypeBadge').textContent = '🔮 The Visionary Builder';
    } else {
        document.getElementById('userNameDisplay').textContent = 'ตัวอย่าง';
        document.getElementById('userDetailDisplay').textContent = 'เกิด 30 ก.ค. 1981 · กรุ๊ป O';
        document.getElementById('archetypeBadge').textContent = '🔮 The Visionary Builder';
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

// ============================================
// AI SWITCHING
// ============================================
function switchAI(lens) {
    currentAI = lens;
    document.querySelectorAll('.ai-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${lens}`).classList.add('active');
    
    const titles = {
        auto: 'ระบบเลือกเลนส์ที่เหมาะสมให้คุณ...',
        vela: '⚡ เวล่า วิเคราะห์ตัวตน · Western Astrology',
        wellani: '🌟 เว็ลลานี่ วิเคราะห์แนวโน้ม · Vedic + Thai'
    };
    document.getElementById('voiceTitle').textContent = titles[lens] || titles.auto;
    
    resetAudio();
    renderAnalysisCards();
    showToast(`เปลี่ยนเป็น: ${lens === 'auto' ? 'ระบบอัตโนมัติ' : lens === 'vela' ? 'เวล่า (Western)' : 'เว็ลลานี่ (Vedic+Thai)'}`);
}

// ============================================
// TAB SWITCHING
// ============================================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById('voiceTab').style.display = tab === 'voice' ? 'block' : 'none';
    document.getElementById('analysisTab').style.display = tab === 'analysis' ? 'block' : 'none';
}

// ============================================
// AUDIO PLAYBACK
// ============================================
function togglePlay() {
    const btn = document.getElementById('playBtn');
    if (isPlaying) {
        isPlaying = false;
        btn.textContent = '▶';
        btn.classList.remove('playing');
        clearInterval(progressInterval);
    } else {
        isPlaying = true;
        btn.textContent = '⏸';
        btn.classList.add('playing');
        progressInterval = setInterval(() => {
            if (audioProgress < audioDuration) {
                audioProgress += 0.5;
                updateProgress();
            } else {
                isPlaying = false;
                btn.textContent = '▶';
                btn.classList.remove('playing');
                clearInterval(progressInterval);
            }
        }, 500 / currentSpeed);
    }
}

function updateProgress() {
    const percent = (audioProgress / audioDuration) * 100;
    document.getElementById('progressFill').style.width = percent + '%';
    const current = Math.floor(audioProgress);
    const mins = Math.floor(current / 60);
    const secs = current % 60;
    document.getElementById('currentTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    const totalMins = Math.floor(audioDuration / 60);
    const totalSecs = Math.floor(audioDuration % 60);
    document.getElementById('totalTime').textContent = `${totalMins}:${totalSecs.toString().padStart(2, '0')}`;
}

function skipForward() { audioProgress = Math.min(audioProgress + 10, audioDuration); updateProgress(); }
function skipBack() { audioProgress = Math.max(audioProgress - 10, 0); updateProgress(); }

function setSpeed(speed) {
    currentSpeed = speed;
    document.getElementById('speedDisplay').textContent = speed + 'x';
    document.querySelectorAll('.voice-opt').forEach(o => o.classList.remove('selected'));
    const speedBtns = document.querySelectorAll('.voice-opt');
    speedBtns.forEach(b => { if (b.textContent.includes(speed + 'x')) b.classList.add('selected'); });
    if (isPlaying) {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (audioProgress < audioDuration) { audioProgress += 0.5; updateProgress(); }
        }, 500 / currentSpeed);
    }
    showToast(`ปรับความเร็วเป็น ${speed}x`);
}

function restartAudio() {
    audioProgress = 0; updateProgress();
    if (isPlaying) {
        clearInterval(progressInterval);
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('playBtn').classList.remove('playing');
    }
    showToast('เริ่มใหม่');
}

function resetAudio() {
    clearInterval(progressInterval);
    isPlaying = false;
    audioProgress = 0;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('currentTime').textContent = '0:00';
}

function downloadReport() {
    let report = '=== ASTROVERA — รายงานวิเคราะห์ชีวิต ===\n\n';
    const saved = localStorage.getItem('astrovera_user_data');
    if (saved) {
        const data = JSON.parse(saved);
        report += `ชื่อ: ${data.name || 'ไม่ระบุ'}\n`;
        report += `วันเกิด: ${formatDate(data.birth_date)}\n`;
        report += `เวลาเกิด: ${data.birth_time || 'ไม่ระบุ'}\n`;
        report += `สถานที่เกิด: ${data.birth_place || 'ไม่ระบุ'}\n`;
        report += `กรุ๊ปเลือด: ${data.blood_type || 'ไม่ระบุ'}\n\n`;
    }
    report += '--- เลนส์: ' + (currentAI === 'auto' ? 'อัตโนมัติ' : currentAI === 'vela' ? 'เวล่า' : 'เว็ลลานี่') + ' ---\n\n';
    report += '[เวล่า — ตัวตน]\nบุคลิกภาพ: ' + analysisData.vela.personality + '\nจุดแข็ง: ' + analysisData.vela.strength + '\nจุดอ่อน: ' + analysisData.vela.weakness + '\nพรสวรรค์: ' + analysisData.vela.talent + '\n\n';
    report += '[เว็ลลานี่ — แนวโน้ม]\nการเงิน: ' + analysisData.wellani.finance_trend + '\nลงทุน: ' + analysisData.wellani.investment_advice + '\nความสัมพันธ์: ' + analysisData.wellani.relationship_trend + '\n5 ปี: ' + analysisData.wellani.forecast_5y + '\n';
    
    const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'astrovera-report-' + new Date().toISOString().split('T')[0] + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📥 ดาวน์โหลดรายงานเรียบร้อย');
}

// ============================================
// CHAT
// ============================================
function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;
    addChatMessage('user', 'คุณ', message);
    input.value = '';
    setTimeout(() => {
        const lensName = currentAI === 'auto' ? 'ASTROVERA' : currentAI === 'vela' ? 'เวล่า' : 'เว็ลลานี่';
        let response = generateAIResponse(message);
        addChatMessage('ai', lensName, response);
    }, 800 + Math.random() * 1500);
}

function generateAIResponse(question) {
    const responses = {
        vela: [
            'จากมุมมองตัวตนของคุณ (Western Astrology) — คุณมีพลังงานของนักสร้างที่ผสมผสานระหว่างวิสัยทัศน์กับการลงมือทำ จุดแข็งหลักคือการมองภาพใหญ่',
            'การวิเคราะห์บุคลิกภาพชี้ว่า คุณทำได้ดีที่สุดเมื่อมีอิสระในการตัดสินใจและสร้างสิ่งใหม่จากความคิด',
        ],
        wellani: [
            'จากมุมมอง Vedic + Thai — จังหวะชีวิตคุณกำลังเข้าสู่ช่วงที่ดีในไตรมาสแรกของปี 2027 ดาวพฤหัสเคลื่อนผ่านเรือนการเงินของคุณ',
            'ตามหลักโหราศาสตร์ไทย ดาวเสาร์กำลังทดสอบความอดทนของคุณ แต่ผลลัพธ์จะดีหากไม่รีบร้อนเกินไป',
        ]
    };
    const pool = currentAI === 'vela' ? responses.vela : currentAI === 'wellani' ? responses.wellani : [...responses.vela, ...responses.wellani];
    return pool[Math.floor(Math.random() * pool.length)];
}

function addChatMessage(type, sender, text) {
    const history = document.getElementById('chatHistory');
    const msg = document.createElement('div');
    msg.className = 'chat-msg ' + type;
    msg.innerHTML = `<div class="sender">${sender === 'คุณ' ? '👤 คุณ' : '🔮 ' + sender}</div>${text}`;
    history.appendChild(msg);
    history.scrollTop = history.scrollHeight;
}

function toggleMic() {
    const micBtn = document.getElementById('micBtn');
    isListening = !isListening;
    if (isListening) {
        micBtn.classList.add('listening');
        showToast('🎤 กำลังฟัง... (พูดได้เลย)');
        setTimeout(() => {
            if (isListening) {
                document.getElementById('chatInput').value = 'แนวโน้มการเงินปีนี้เป็นยังไง';
                micBtn.classList.remove('listening');
                isListening = false;
                showToast('✅ รับข้อความแล้ว');
            }
        }, 2000);
    } else {
        micBtn.classList.remove('listening');
        showToast('หยุดฟัง');
    }
}

// ============================================
// TOAST
// ============================================
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}
