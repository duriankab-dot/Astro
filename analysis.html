<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ASTROVERA — ผลวิเคราะห์ตัวตน</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <header>
        <div class="logo">ASTROVERA</div>
        <nav>
            <a href="index.html">หน้าแรก</a>
            <a href="analysis.html">วิเคราะห์</a>
        </nav>
    </header>

    <main class="analysis-container">
        <h1>🧠 ผลวิเคราะห์ตัวตนของคุณ</h1>

        <div class="lens-selector">
            <span>เลือก AI:</span>
            <button class="lens-btn active" data-lens="vela">🌿 เวล่า · ตัวตน</button>
            <button class="lens-btn" data-lens="wellani">🌟 เว็ลลานี่ · แนวโน้ม</button>
        </div>

        <div id="result" class="result-box">
            <p>⏳ กำลังวิเคราะห์... กรุณารอสักครู่</p>
        </div>

        <div class="voice-controls">
            <button id="playVoiceBtn">▶ ฟังเสียงสรุป</button>
            <button id="stopVoiceBtn">⏹ หยุด</button>
            <label>ความเร็ว: <input type="range" id="rateControl" min="0.5" max="2" step="0.1" value="0.9" /></label>
        </div>

        <div class="ask-more">
            <textarea id="followUpQuestion" placeholder="พิมพ์คำถามเพิ่มเติม..."></textarea>
            <button id="askBtn">ส่งคำถาม</button>
        </div>

        <button id="saveBtn" class="btn-secondary">💾 บันทึกผลวิเคราะห์</button>
    </main>

    <footer>
        <p>© 2026 ASTROVERA — DATA LIFE INTELLIGENCE</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
