<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTROVERA — ค้นหาตัวตน</title>
    <style>
        /* ===== CSS ทั้งหมดของต้นแบบคุณ ===== */
        /* ผมขอใส่เฉพาะส่วนที่จำเป็นนะครับ */
        /* แต่คุณสามารถใช้ CSS เดิมของคุณได้เลย */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f8f6f2;
            color: #1e1e1e;
            line-height: 1.6;
        }
        /* ... CSS ที่เหลือทั้งหมดของคุณ ... */
        /* (ใช้ของเดิมทั้งหมด ไม่เปลี่ยนแปลง) */
    </style>
</head>
<body>

    <!-- ===== เนื้อหาทั้งหมดของต้นแบบคุณ ===== -->
    <!-- ใช้ HTML เดิมทั้งหมด ไม่เปลี่ยนแปลง -->

    <!-- เพิ่มระบบ AI ที่ส่วนท้ายของหน้า -->
    <section id="ai-section">
        <h2>🧠 วิเคราะห์ด้วย AI</h2>

        <!-- Lens Selector -->
        <div class="lens-selector">
            <button class="lens-btn active" data-lens="vela">🌿 เวล่า · ตัวตน</button>
            <button class="lens-btn" data-lens="wellani">🌟 เว็ลลานี่ · แนวโน้ม</button>
        </div>

        <!-- Result Box -->
        <div id="result" class="result-box">
            ⏳ กรอกข้อมูลแล้วกดวิเคราะห์
        </div>

        <!-- Voice Controls -->
        <div class="voice-controls">
            <button id="playVoiceBtn">▶ ฟังเสียง</button>
            <button id="stopVoiceBtn">⏹ หยุด</button>
            <label>ความเร็ว: <input type="range" id="rateControl" min="0.5" max="2" step="0.1" value="0.9" /></label>
        </div>

        <!-- Ask More -->
        <div class="ask-more">
            <textarea id="followUpQuestion" placeholder="พิมพ์คำถามเพิ่มเติม..."></textarea>
            <button id="askBtn">ส่ง</button>
        </div>

        <!-- Save -->
        <button id="saveBtn" class="btn-secondary">💾 บันทึก</button>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 ASTROVERA — DATA LIFE INTELLIGENCE</p >
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // =============================================
        // 1. API FUNCTIONS
        // =============================================
        const API_BASE = '/.netlify/functions';

        async function analyzeWithDeepseek(lens = 'vela') {
            const payload = {
                user_id: 'demo-user',
                name: 'ธีรชัย พรั่งยืน',
                gender: 'ชาย',
                birth_date: '1981-07-30',
                birth_time: '10:24',
                birth_place: 'กรุงเทพฯ, ไทย',
                blood_type: 'O',
                events: {
                    start_work_year: 2009,
                    job_change_year: 2011,
                    business_peak_year: 2022,
                    best_finance_year: 2022,
                    worst_finance_year: 2024,
                    lost_family_year: 2024,
                    major_issues: 'ย้ายประเทศไปมา 2 ปี'
                },
                question: 'เน้นอาชีพ การเงิน ความรัก แนวโน้ม 5 ปี',
                lens: lens
            };

            const response = await fetch(`${API_BASE}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`API error: ${err}`);
            }

            const result = await response.json();
            return result.data || 'ไม่ได้รับข้อมูล';
        }

        async function askFollowUp(question, lens = 'vela') {
            const payload = {
                user_id: 'demo-user',
                question: question,
                lens: lens,
                context: 'follow-up'
            };

            const response = await fetch(`${API_BASE}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('ไม่สามารถส่งคำถามได้');
            const result = await response.json();
            return result.data || 'ไม่ได้รับคำตอบ';
        }

        async function saveToSupabase(content) {
            const payload = {
                user_id: 'demo-user',
                content: content,
                lens: document.querySelector('.lens-btn.active')?.dataset.lens || 'unknown',
                created_at: new Date().toISOString()
            };

            const response = await fetch(`${API_BASE}/save-data`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(err);
            }
            return await response.json();
        }

        // =============================================
        // 2. VOICE FUNCTIONS
        // =============================================
        let currentUtterance = null;

        function speakText(text, rate = 0.9) {
            if (!window.speechSynthesis) {
                alert('เบราว์เซอร์ไม่รองรับ');
                return;
            }
            stopSpeaking();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = rate;
            utterance.pitch = 1;
            utterance.volume = 1;
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.startsWith('th') && v.name.includes('Female'));
            if (thaiVoice) utterance.voice = thaiVoice;
            currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        }

        function stopSpeaking() {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            currentUtterance = null;
        }

        // =============================================
        // 3. UI CONTROLS
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {

            // ---- Lens Selector ----
            const lensBtns = document.querySelectorAll('.lens-btn');
            const resultBox = document.getElementById('result');

            lensBtns.forEach(btn => {
                btn.addEventListener('click', async function() {
                    lensBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const lens = this.dataset.lens;
                    resultBox.innerHTML = '⏳ กำลังวิเคราะห์...';
                    try {
                        const data = await analyzeWithDeepseek(lens);
                        resultBox.innerHTML = data;
                    } catch (err) {
                        resultBox.innerHTML = '❌ ' + err.message;
                    }
                });
            });

            // ---- Auto-load default lens ----
            const defaultLens = document.querySelector('.lens-btn.active');
            if (defaultLens) defaultLens.click();

            // ---- Voice ----
            const playBtn = document.getElementById('playVoiceBtn');
            const stopBtn = document.getElementById('stopVoiceBtn');
            const rateControl = document.getElementById('rateControl');

            if (playBtn) {
                playBtn.addEventListener('click', function() {
                    const text = resultBox ? resultBox.innerText : '';
                    if (text && text !== '⏳ กำลังวิเคราะห์...' && text !== '⏳ กำลังคิดคำตอบ...') {
                        const rate = parseFloat(rateControl?.value || 0.9);
                        speakText(text, rate);
                    } else {
                        alert('ยังไม่มีข้อความให้อ่าน');
                    }
                });
            }

            if (stopBtn) {
                stopBtn.addEventListener('click', stopSpeaking);
            }

            // ---- Follow-up ----
            const askBtn = document.getElementById('askBtn');
            const questionInput = document.getElementById('followUpQuestion');

            if (askBtn && questionInput) {
                askBtn.addEventListener('click', async function() {
                    const q = questionInput.value.trim();
                    if (!q) return alert('กรุณาพิมพ์คำถาม');
                    const activeLens = document.querySelector('.lens-btn.active');
                    const lens = activeLens ? activeLens.dataset.lens : 'vela';
                    resultBox.innerHTML = '⏳ กำลังคิดคำตอบ...';
                    try {
                        const answer = await askFollowUp(q, lens);
                        resultBox.innerHTML = answer;
                        questionInput.value = '';
                    } catch (err) {
                        resultBox.innerHTML = '❌ ' + err.message;
                    }
                });
            }

            // ---- Save ----
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', async function() {
                    const text = resultBox ? resultBox.innerText : '';
                    if (!text || text === '⏳ กำลังวิเคราะห์...' || text === '⏳ กำลังคิดคำตอบ...') {
                        return alert('ยังไม่มีข้อมูลให้บันทึก');
                    }
                    try {
                        await saveToSupabase(text);
                        alert('✅ บันทึกสำเร็จ!');
                    } catch (err) {
                        alert('❌ ' + err.message);
                    }
                });
            }
        });

        // Preload voices
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
